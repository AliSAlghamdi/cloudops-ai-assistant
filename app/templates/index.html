<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudOps AI Assistant</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="container">
        <h1>CloudOps AI Assistant</h1>
        <p class="subtitle">Ask cloud questions and classify support tickets</p>

        <section class="card">
            <h2>Ask a Cloud Question</h2>
            <form method="get" action="/">
                <div class="form-row">
                    <input
                        type="text"
                        name="question"
                        placeholder="Example: What is Cloud NAT?"
                        value=""
                    />
                    <button type="submit">Ask</button>
                </div>
            </form>

            {% if answer %}
            <div class="result-box">
                <h3>Answer</h3>
                <p>{{ answer }}</p>
            </div>
            {% endif %}
        </section>

        <section class="card">
            <h2>Classify a Ticket</h2>
            <form method="get" action="/">
                <div class="form-row">
                    <input
                        type="text"
                        name="ticket"
                        placeholder="Example: My password is not working"
                        value=""
                    />
                    <button type="submit">Classify</button>
                </div>
            </form>

            {% if category %}
            <div class="result-box">
                <h3>Category</h3>
                <p>{{ category }}</p>
            </div>
            {% endif %}
        </section>
    </div>
</body>
</html>
